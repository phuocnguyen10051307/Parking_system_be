name: Deploy Backend

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e

            cd /var/www/parking_project/Parking_system_be

            git fetch origin main
            git reset --hard origin/main

            npm ci
            npx prisma generate
            npx prisma migrate deploy

            pm2 restart parking-be --update-env
            pm2 save

            sleep 3
            curl --fail http://localhost:3000/v1/status
